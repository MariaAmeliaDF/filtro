<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Maria Amélia · #MinhaEsperançaTemVoz · Foto de Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --amarelo: #FFD600;
      --azul: #1A47A8;
      --verde: #1B8A2E;
      --branco: #FFFFFF;
      --preto: #111111;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: #0a0f1e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px 40px;
      color: var(--branco);
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1.5rem, 5vw, 2.4rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.1;
    }
    .header h1 span.tag { color: var(--amarelo); }
    .header p {
      font-size: 0.9rem;
      color: #aab;
      margin-top: 6px;
    }

    /* ── Canvas wrapper ── */
    .canvas-wrap {
      position: relative;
      width: min(480px, 92vw);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      overflow: hidden;
      background: #222;
      box-shadow: 0 0 0 5px var(--amarelo), 0 0 0 9px var(--azul), 0 12px 48px rgba(0,0,0,0.6);
      cursor: grab;
      user-select: none;
      touch-action: none;
    }
    .canvas-wrap:active { cursor: grabbing; }

    canvas#outputCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
    }

    /* ── Placeholder message inside canvas ── */
    .canvas-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 0.9rem;
      pointer-events: none;
      gap: 8px;
    }
    .canvas-placeholder svg { opacity: 0.4; }

    /* ── Controls ── */
    .controls {
      width: min(480px, 92vw);
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn-upload {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--amarelo);
      color: var(--preto);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      padding: 14px 20px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: 0 4px 18px rgba(255,214,0,0.35);
    }
    .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,214,0,0.5); }
    .btn-upload:active { transform: translateY(0); }

    input[type="file"] { display: none; }

    .zoom-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .zoom-row label {
      font-size: 0.8rem;
      color: #aab;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      min-width: 52px;
    }
    input[type="range"] {
      flex: 1;
      accent-color: var(--amarelo);
      height: 4px;
      cursor: pointer;
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }
    .btn-rotate {
      flex: 0 0 auto;
      background: #1a2040;
      border: 1px solid #2a3560;
      color: var(--branco);
      font-size: 1.3rem;
      width: 52px; height: 52px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .btn-rotate:hover { background: #22305a; }

    .btn-download {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--azul);
      color: var(--branco);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      padding: 14px 20px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: 0 4px 18px rgba(26,71,168,0.35);
    }
    .btn-download:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(26,71,168,0.5); }
    .btn-download:active { transform: translateY(0); }
    .btn-download:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .hint {
      font-size: 0.75rem;
      color: #667;
      text-align: center;
    }

    /* ── Footer ── */
    footer {
      margin-top: 36px;
      font-size: 0.72rem;
      color: #444;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Foto de Perfil<br><span class="tag">#MinhaEsperançaTemVoz</span></h1>
    <p>Envie sua foto, ajuste e baixe com a moldura da Maria Amélia</p>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="outputCanvas" width="1080" height="1080"></canvas>
    <div class="canvas-placeholder" id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="m21 15-5-5L5 21"/>
      </svg>
      <span>Escolha uma foto para começar</span>
    </div>
  </div>

  <div class="controls">
    <label class="btn-upload" for="fileInput">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Escolha uma foto sua
    </label>
    <input type="file" id="fileInput" accept="image/*" />

    <div class="zoom-row">
      <label>🔍 Zoom</label>
      <input type="range" id="zoomSlider" min="0.5" max="3" step="0.01" value="1" />
    </div>

    <div class="btn-row">
      <button class="btn-rotate" id="rotateBtn" title="Girar 90°">↻</button>
      <button class="btn-download" id="downloadBtn" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Baixar minha foto
      </button>
    </div>
    <p class="hint">✋ Arraste a foto para reposicionar · use o zoom acima</p>
  </div>

  <footer>Imagem gerada em 1080×1080 · #MinhaEsperançaTemVoz · Maria Amélia</footer>

  <script>
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');
    const SIZE = 1080;

    // ── State ──
    let userImg = null;
    let frameImg = null;
    let zoom = 1;
    let rotation = 0; // degrees, multiples of 90
    let offsetX = 0, offsetY = 0;

    // drag
    let dragging = false;
    let dragStart = { x: 0, y: 0 };
    let offsetAtDrag = { x: 0, y: 0 };

    // ── Load frame image ──
    const FRAME_SRC = '3_TRANSPARENTE__USAR_ESSE_.png'; // same folder as index.html

    function loadFrame() {
      return new Promise(resolve => {
        frameImg = new Image();
        frameImg.onload = () => resolve();
        frameImg.onerror = () => { console.warn('Frame not found at ' + FRAME_SRC); resolve(); };
        frameImg.src = FRAME_SRC;
      });
    }

    // ── Draw ──
    function draw() {
      ctx.clearRect(0, 0, SIZE, SIZE);

      if (userImg) {
        ctx.save();
        ctx.translate(SIZE / 2 + offsetX, SIZE / 2 + offsetY);
        ctx.rotate((rotation * Math.PI) / 180);
        ctx.scale(zoom, zoom);

        const iw = userImg.naturalWidth;
        const ih = userImg.naturalHeight;

        // fit image to fill square at scale 1
        const baseScale = Math.max(SIZE / iw, SIZE / ih);
        const dw = iw * baseScale;
        const dh = ih * baseScale;

        ctx.drawImage(userImg, -dw / 2, -dh / 2, dw, dh);
        ctx.restore();
      } else {
        // dark background placeholder
        ctx.fillStyle = '#1a1a2a';
        ctx.fillRect(0, 0, SIZE, SIZE);
      }

      // frame overlay (covers full 1080×1080)
      if (frameImg && frameImg.complete && frameImg.naturalWidth > 0) {
        ctx.drawImage(frameImg, 0, 0, SIZE, SIZE);
      }
    }

    // ── File upload ──
    document.getElementById('fileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          userImg = img;
          zoom = 1; rotation = 0; offsetX = 0; offsetY = 0;
          document.getElementById('zoomSlider').value = 1;
          document.getElementById('placeholder').style.display = 'none';
          document.getElementById('downloadBtn').disabled = false;
          draw();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    // ── Zoom ──
    document.getElementById('zoomSlider').addEventListener('input', e => {
      zoom = parseFloat(e.target.value);
      draw();
    });

    // ── Rotate ──
    document.getElementById('rotateBtn').addEventListener('click', () => {
      rotation = (rotation + 90) % 360;
      draw();
    });

    // ── Drag (mouse) ──
    const wrap = document.getElementById('canvasWrap');

    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      const scaleX = SIZE / r.width;
      const scaleY = SIZE / r.height;
      if (e.touches) {
        return { x: (e.touches[0].clientX - r.left) * scaleX, y: (e.touches[0].clientY - r.top) * scaleY };
      }
      return { x: (e.clientX - r.left) * scaleX, y: (e.clientY - r.top) * scaleY };
    }

    canvas.addEventListener('mousedown', e => {
      if (!userImg) return;
      dragging = true;
      dragStart = getPos(e);
      offsetAtDrag = { x: offsetX, y: offsetY };
    });
    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      const p = getPos(e);
      offsetX = offsetAtDrag.x + (p.x - dragStart.x);
      offsetY = offsetAtDrag.y + (p.y - dragStart.y);
      draw();
    });
    window.addEventListener('mouseup', () => { dragging = false; });

    // ── Drag (touch) ──
    canvas.addEventListener('touchstart', e => {
      if (!userImg) return;
      e.preventDefault();
      dragging = true;
      dragStart = getPos(e);
      offsetAtDrag = { x: offsetX, y: offsetY };
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
      if (!dragging) return;
      e.preventDefault();
      const p = getPos(e);
      offsetX = offsetAtDrag.x + (p.x - dragStart.x);
      offsetY = offsetAtDrag.y + (p.y - dragStart.y);
      draw();
    }, { passive: false });
    canvas.addEventListener('touchend', () => { dragging = false; });

    // ── Pinch zoom ──
    let lastPinchDist = null;
    canvas.addEventListener('touchstart', e => {
      if (e.touches.length === 2) lastPinchDist = null;
    }, { passive: true });
    canvas.addEventListener('touchmove', e => {
      if (e.touches.length !== 2) return;
      e.preventDefault();
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      if (lastPinchDist !== null) {
        const delta = dist / lastPinchDist;
        zoom = Math.min(3, Math.max(0.5, zoom * delta));
        document.getElementById('zoomSlider').value = zoom;
        draw();
      }
      lastPinchDist = dist;
    }, { passive: false });

    // ── Download ──
    document.getElementById('downloadBtn').addEventListener('click', () => {
      // draw once more at full resolution
      draw();
      const link = document.createElement('a');
      link.download = 'maria-amelia-moldura.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    // ── Init ──
    loadFrame().then(() => draw());
  </script>
</body>
</html>
