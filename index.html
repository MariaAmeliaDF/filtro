<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Maria Amélia · #MinhaEsperançaTemVoz · Foto de Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --amarelo: #FFD600;
      --azul: #1A47A8;
      --verde: #1B8A2E;
      --branco: #FFFFFF;
      --preto: #111111;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #0a0f1e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px 40px;
      color: #fff;
    }
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.1;
    }
    .header h1 span { color: var(--amarelo); }
    .header p { font-size: 0.88rem; color: #889; margin-top: 6px; }

    /* Preview circle */
    .preview-wrap {
      position: relative;
      width: min(380px, 88vw);
      aspect-ratio: 1/1;
      border-radius: 50%;
      overflow: hidden;
      background: #1a1a2e;
      box-shadow: 0 0 0 5px var(--amarelo), 0 0 0 9px var(--azul), 0 12px 48px rgba(0,0,0,0.7);
      cursor: grab;
      touch-action: none;
      user-select: none;
    }
    .preview-wrap:active { cursor: grabbing; }
    .preview-wrap canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
    }
    .placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #445; gap: 8px; font-size: 0.85rem;
      pointer-events: none;
    }

    .controls {
      width: min(380px, 88vw);
      margin-top: 20px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .btn-upload {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--amarelo); color: var(--preto);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; border: none; border-radius: 10px;
      padding: 14px 20px; cursor: pointer;
      box-shadow: 0 4px 18px rgba(255,214,0,0.3);
      transition: transform .12s, box-shadow .12s;
    }
    .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,214,0,0.5); }
    input[type="file"] { display: none; }

    .zoom-row {
      display: flex; align-items: center; gap: 12px;
    }
    .zoom-row label { font-size: 0.78rem; color: #889; text-transform: uppercase; letter-spacing: .08em; min-width: 50px; }
    input[type="range"] { flex: 1; accent-color: var(--amarelo); cursor: pointer; }

    .btn-row { display: flex; gap: 10px; }
    .btn-rotate {
      flex: 0 0 auto; background: #1a2040; border: 1px solid #2a3560;
      color: #fff; font-size: 1.4rem; width: 52px; height: 52px;
      border-radius: 10px; cursor: pointer; transition: background .12s;
    }
    .btn-rotate:hover { background: #22305a; }
    .btn-download {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--azul); color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem; font-weight: 700; letter-spacing: .05em;
      text-transform: uppercase; border: none; border-radius: 10px;
      padding: 14px 20px; cursor: pointer;
      box-shadow: 0 4px 18px rgba(26,71,168,0.3);
      transition: transform .12s, box-shadow .12s;
    }
    .btn-download:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(26,71,168,0.5); }
    .btn-download:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .hint { font-size: .72rem; color: #556; text-align: center; }
    footer { margin-top: 36px; font-size: .7rem; color: #334; text-align: center; }
  </style>
</head>
<body>

<div class="header">
  <h1>Foto de Perfil<br><span>#MinhaEsperançaTemVoz</span></h1>
  <p>Envie sua foto, ajuste e baixe com a moldura da Maria Amélia</p>
</div>

<div class="preview-wrap" id="wrap">
  <canvas id="cv" width="1000" height="1000"></canvas>
  <div class="placeholder" id="ph">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="m21 15-5-5L5 21"/>
    </svg>
    <span>Escolha uma foto para começar</span>
  </div>
</div>

<div class="controls">
  <label class="btn-upload" for="fi">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    Escolher minha foto
  </label>
  <input type="file" id="fi" accept="image/*" />

  <div class="zoom-row">
    <label>🔍 Zoom</label>
    <input type="range" id="zoom" min="0.5" max="3" step="0.01" value="1" />
  </div>

  <div class="btn-row">
    <button class="btn-rotate" id="rotBtn" title="Girar">↻</button>
    <button class="btn-download" id="dlBtn" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Baixar minha foto
    </button>
  </div>
  <p class="hint">✋ Arraste para reposicionar · Dois dedos para dar zoom</p>
</div>

<footer>#MinhaEsperançaTemVoz · Maria Amélia · 1000×1000px</footer>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const SIZE = 1000;

let userImg = null;
let frameImg = null;
let zoom = 1, rot = 0;
let ox = 0, oy = 0;
let dragging = false, dragStart = {x:0,y:0}, oxAtDrag = 0, oyAtDrag = 0;

// Load frame
function loadFrame() {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => { frameImg = img; res(); };
    img.onerror = () => { console.warn('moldura.png não encontrada'); res(); };
    img.src = 'moldura.png';
  });
}

function draw() {
  ctx.clearRect(0, 0, SIZE, SIZE);

  if (userImg) {
    ctx.save();
    ctx.translate(SIZE/2 + ox, SIZE/2 + oy);
    ctx.rotate(rot * Math.PI / 180);
    ctx.scale(zoom, zoom);
    const iw = userImg.naturalWidth, ih = userImg.naturalHeight;
    const s = Math.max(SIZE/iw, SIZE/ih);
    ctx.drawImage(userImg, -iw*s/2, -ih*s/2, iw*s, ih*s);
    ctx.restore();
  } else {
    ctx.fillStyle = '#141428';
    ctx.fillRect(0, 0, SIZE, SIZE);
  }

  // Overlay the frame (transparent PNG) on top
  if (frameImg) {
    ctx.drawImage(frameImg, 0, 0, SIZE, SIZE);
  }
}

// File input
document.getElementById('fi').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    const img = new Image();
    img.onload = () => {
      userImg = img;
      zoom = 1; rot = 0; ox = 0; oy = 0;
      document.getElementById('zoom').value = 1;
      document.getElementById('ph').style.display = 'none';
      document.getElementById('dlBtn').disabled = false;
      draw();
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(f);
});

// Zoom slider
document.getElementById('zoom').addEventListener('input', e => {
  zoom = parseFloat(e.target.value);
  draw();
});

// Rotate
document.getElementById('rotBtn').addEventListener('click', () => {
  rot = (rot + 90) % 360;
  draw();
});

// Drag helpers
function getXY(e) {
  const r = cv.getBoundingClientRect();
  const sx = SIZE / r.width, sy = SIZE / r.height;
  if (e.touches) return { x: (e.touches[0].clientX - r.left)*sx, y: (e.touches[0].clientY - r.top)*sy };
  return { x: (e.clientX - r.left)*sx, y: (e.clientY - r.top)*sy };
}

cv.addEventListener('mousedown', e => {
  if (!userImg) return;
  dragging = true;
  const p = getXY(e); dragStart = p;
  oxAtDrag = ox; oyAtDrag = oy;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const p = getXY(e);
  ox = oxAtDrag + (p.x - dragStart.x);
  oy = oyAtDrag + (p.y - dragStart.y);
  draw();
});
window.addEventListener('mouseup', () => { dragging = false; });

// Touch drag
cv.addEventListener('touchstart', e => {
  if (!userImg || e.touches.length !== 1) return;
  e.preventDefault();
  dragging = true;
  dragStart = getXY(e);
  oxAtDrag = ox; oyAtDrag = oy;
}, { passive: false });
cv.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    // pinch zoom handled separately
    return;
  }
  if (!dragging) return;
  const p = getXY(e);
  ox = oxAtDrag + (p.x - dragStart.x);
  oy = oyAtDrag + (p.y - dragStart.y);
  draw();
}, { passive: false });
cv.addEventListener('touchend', () => { dragging = false; });

// Pinch zoom
let lastPinch = null;
cv.addEventListener('touchstart', e => { if (e.touches.length === 2) lastPinch = null; }, { passive: true });
cv.addEventListener('touchmove', e => {
  if (e.touches.length !== 2) return;
  e.preventDefault();
  const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  if (lastPinch) {
    zoom = Math.min(3, Math.max(0.5, zoom * (d / lastPinch)));
    document.getElementById('zoom').value = zoom;
    draw();
  }
  lastPinch = d;
}, { passive: false });

// Download — output is square 1000x1000, the circle is just CSS on screen
document.getElementById('dlBtn').addEventListener('click', () => {
  draw();
  // Crop to circle for download
  const tmp = document.createElement('canvas');
  tmp.width = tmp.height = SIZE;
  const tc = tmp.getContext('2d');
  tc.beginPath();
  tc.arc(SIZE/2, SIZE/2, SIZE/2, 0, Math.PI*2);
  tc.closePath();
  tc.clip();
  tc.drawImage(cv, 0, 0);
  const a = document.createElement('a');
  a.download = 'maria-amelia-moldura.png';
  a.href = tmp.toDataURL('image/png');
  a.click();
});

loadFrame().then(draw);
</script>
</body>
</html>
