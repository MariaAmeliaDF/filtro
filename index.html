<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Maria Amélia · #MinhaEsperançaTemVoz</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Cores solicitadas: Verde Bandeira do Brasil e tons escuros */
      --verde-bandeira: #009b3a; 
      --verde-escuro: #004b1c;
      --amarelo-ouro: #ffdf00;
      --azul-marinho: #002776;
      --branco: #ffffff;
      --fundo-escuro: #0a1a0f;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      /* Fundo mais escuro com gradiente sutil para o verde bandeira */
      background: radial-gradient(circle at top, var(--verde-escuro) 0%, var(--fundo-escuro) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 48px;
      color: var(--branco);
    }

    .header { text-align: center; margin-bottom: 24px; width: 100%; max-width: 500px; }
    
    /* Espaço reservado para a logo que será carregada via Git */
    .logo-placeholder {
      width: min(300px, 80vw);
      height: 80px; /* Altura reservada */
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-placeholder img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .header p { 
      font-size: 0.9rem; 
      color: var(--amarelo-ouro); 
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0.9;
    }

    /* ── The circular preview ── */
    .circle-outer {
      width: min(420px, 90vw);
      aspect-ratio: 1/1;
      border-radius: 50%;
      padding: 8px;
      /* Contorno usando as cores do Brasil */
      background: linear-gradient(45deg, var(--verde-bandeira), var(--amarelo-ouro), var(--verde-bandeira));
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      margin-bottom: 24px;
    }
    .circle-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      background: #ffffff;
      cursor: grab;
      touch-action: none;
      user-select: none;
    }
    .circle-inner:active { cursor: grabbing; }

    #cv {
      width: 100%;
      height: 100%;
      display: block;
    }

    .placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #777; gap: 12px; font-size: .9rem;
      pointer-events: none;
      text-align: center;
    }
    .placeholder svg { color: var(--verde-bandeira); opacity: 0.6; }

    /* ── Controls ── */
    .controls {
      width: min(400px, 90vw);
      display: flex; flex-direction: column; gap: 16px;
      background: rgba(255, 255, 255, 0.05);
      padding: 24px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
    }

    .btn-upload {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--verde-bandeira); color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; border: none; border-radius: 12px;
      padding: 16px 20px; cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 155, 58, 0.3);
      transition: all .2s;
    }
    .btn-upload:hover { transform: translateY(-2px); background: var(--verde-escuro); }

    input[type="file"] { display: none; }

    .zoom-row { display: flex; align-items: center; gap: 12px; }
    .zoom-row label { font-size: .75rem; color: #aaa; font-weight: 700; text-transform: uppercase; min-width: 50px; }
    input[type="range"] { flex:1; accent-color: var(--amarelo-ouro); cursor: pointer; height: 6px; }

    .btn-row { display: flex; gap: 12px; }

    .btn-rotate {
      background: transparent; border: 2px solid rgba(255,255,255,0.2); color: #fff;
      width: 56px; height: 56px; border-radius: 12px;
      cursor: pointer; flex-shrink: 0; transition: all .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-rotate:hover { background: rgba(255,255,255,0.1); border-color: var(--amarelo-ouro); }

    .btn-download {
      flex:1; display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--amarelo-ouro); color: var(--verde-escuro);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem; font-weight: 900; letter-spacing: .06em;
      text-transform: uppercase; border: none; border-radius: 12px;
      padding: 16px 20px; cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 223, 0, 0.3);
      transition: all .2s;
    }
    .btn-download:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .btn-download:disabled { opacity: .3; cursor: not-allowed; transform: none; }

    .hint { font-size: .8rem; color: #888; text-align: center; }
    footer { margin-top: 40px; font-size: .75rem; color: #555; text-align: center; font-weight: 600; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo-placeholder">
    <!-- Aqui você deve colocar a tag img com o caminho da sua logo quando subir no git -->
    <!-- Exemplo: <img src="LOGO_MARIA_AMELIA_BRANCO.svg" alt="Logo Maria Amélia"> -->
    <img src="LOGO_MARIA_AMELIA_BRANCO.svg" alt="Logo Maria Amélia">
  </div>
  <p>Filtro oficial de perfil</p>
</div>

<!-- Circular preview -->
<div class="circle-outer">
  <div class="circle-inner" id="circ">
    <canvas id="cv" width="1000" height="1000"></canvas>
    <div class="placeholder" id="ph">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="m21 15-5-5L5 21"/>
      </svg>
      <p>Clique abaixo para enviar sua foto</p>
    </div>
  </div>
</div>

<div class="controls">

  <label class="btn-upload" for="fi">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    Escolher minha foto
  </label>
  <input type="file" id="fi" accept="image/*" />

  <div class="zoom-row">
    <label>🔍 Zoom</label>
    <input type="range" id="zoomR" min="0.5" max="3" step="0.01" value="1" />
  </div>

  <div class="btn-row">
    <button class="btn-rotate" id="rotBtn" title="Girar 90°">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 4v6h-6"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
    <button class="btn-download" id="dlBtn" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Baixar minha foto
    </button>
  </div>

  <p class="hint">✋ Arraste a foto para ajustar</p>
</div>

<footer>#MinhaEsperançaTemVoz · Maria Amélia</footer>

<script>
  const cv  = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const S   = 1000; // canvas size

  let userImg  = null;
  let frameImg = null;
  let zoom = 1, rot = 0;
  let ox = 0, oy = 0;

  function loadFrame() {
    return new Promise(resolve => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        frameImg = img;
        resolve();
      };
      img.onerror = () => resolve();
      img.src = 'moldura.png?v=' + Date.now();
    });
  }

  function draw() {
    ctx.clearRect(0, 0, S, S);
    if (userImg) {
      ctx.save();
      ctx.translate(S / 2 + ox, S / 2 + oy);
      ctx.rotate(rot * Math.PI / 180);
      ctx.scale(zoom, zoom);
      const iw = userImg.naturalWidth, ih = userImg.naturalHeight;
      const base = Math.max(S / iw, S / ih);
      ctx.drawImage(userImg, -iw * base / 2, -ih * base / 2, iw * base, ih * base);
      ctx.restore();
    } else {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, S, S);
    }
    if (frameImg && frameImg.complete && frameImg.naturalWidth > 0) {
      ctx.drawImage(frameImg, 0, 0, S, S);
    }
  }

  document.getElementById('fi').addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        userImg = img;
        zoom = 1; rot = 0; ox = 0; oy = 0;
        document.getElementById('zoomR').value = 1;
        document.getElementById('ph').style.display = 'none';
        document.getElementById('dlBtn').disabled = false;
        draw();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(f);
  });

  document.getElementById('zoomR').addEventListener('input', e => {
    zoom = parseFloat(e.target.value);
    draw();
  });

  document.getElementById('rotBtn').addEventListener('click', () => {
    rot = (rot + 90) % 360;
    draw();
  });

  const circ = document.getElementById('circ');
  let dragging = false, ds = {x:0,y:0}, oxa = 0, oya = 0;

  function pos(e) {
    const r = cv.getBoundingClientRect();
    const sx = S / r.width, sy = S / r.height;
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) * sx, y: (src.clientY - r.top) * sy };
  }

  circ.addEventListener('mousedown', e => {
    if (!userImg) return;
    dragging = true; ds = pos(e); oxa = ox; oya = oy;
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const p = pos(e); ox = oxa + p.x - ds.x; oy = oya + p.y - ds.y; draw();
  });
  window.addEventListener('mouseup', () => { dragging = false; });

  circ.addEventListener('touchstart', e => {
    if (!userImg || e.touches.length !== 1) return;
    e.preventDefault(); dragging = true; ds = pos(e); oxa = ox; oya = oy;
  }, {passive: false});
  circ.addEventListener('touchmove', e => {
    if (e.touches.length === 2) return;
    if (!dragging) return;
    e.preventDefault();
    const p = pos(e); ox = oxa + p.x - ds.x; oy = oya + p.y - ds.y; draw();
  }, {passive: false});
  circ.addEventListener('touchend', () => { dragging = false; });

  let lastPinch = null;
  circ.addEventListener('touchmove', e => {
    if (e.touches.length !== 2) return;
    e.preventDefault();
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                         e.touches[0].clientY - e.touches[1].clientY);
    if (lastPinch) {
      zoom = Math.min(3, Math.max(0.5, zoom * d / lastPinch));
      document.getElementById('zoomR').value = zoom;
      draw();
    }
    lastPinch = d;
  }, {passive: false});
  circ.addEventListener('touchend', () => { lastPinch = null; });

  document.getElementById('dlBtn').addEventListener('click', () => {
    draw();
    const tmp = document.createElement('canvas');
    tmp.width = tmp.height = S;
    const tc = tmp.getContext('2d');
    tc.beginPath();
    tc.arc(S/2, S/2, S/2, 0, Math.PI * 2);
    tc.closePath();
    tc.clip();
    tc.drawImage(cv, 0, 0);

    const a = document.createElement('a');
    a.download = 'filtro-maria-amelia.png';
    a.href = tmp.toDataURL('image/png');
    a.click();
  });

  loadFrame().then(() => draw());
</script>
</body>
</html>
