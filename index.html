<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Maria Amélia · #MinhaEsperançaTemVoz</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Cores extraídas da paleta oficial */
      --verde-primario: #7cc5ad;
      --verde-claro: #dfeedd;
      --amarelo: #fedc50;
      --azul: #0d7cc4;
      --branco: #ffffff;
      --texto-escuro: #1a1a1a;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      /* Substituindo o fundo preto por um gradiente da paleta para remover as "laterais pretas" */
      background: linear-gradient(135deg, var(--verde-primario) 0%, var(--verde-claro) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 48px;
      color: var(--texto-escuro);
    }

    .header { text-align: center; margin-bottom: 24px; width: 100%; max-width: 500px; }
    
    /* Container para a logo no lugar do título textual */
    .logo-container {
      width: min(280px, 70vw);
      margin: 0 auto 12px;
    }
    .logo-container svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      line-height: 1.2;
      color: var(--texto-escuro);
      margin-bottom: 4px;
    }
    .header p { 
      font-size: .95rem; 
      color: rgba(0,0,0,0.7); 
      margin-top: 8px;
      font-weight: 500;
    }

    /* ── The circular preview ── */
    .circle-outer {
      width: min(400px, 85vw);
      aspect-ratio: 1/1;
      border-radius: 50%;
      padding: 8px;
      /* Gradiente do contorno usando a paleta oficial */
      background: linear-gradient(45deg, var(--azul), var(--amarelo));
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
      margin-bottom: 24px;
    }
    .circle-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      background: #f0f0f0;
      cursor: grab;
      touch-action: none;
      user-select: none;
    }
    .circle-inner:active { cursor: grabbing; }

    #cv {
      width: 100%;
      height: 100%;
      display: block;
    }

    .placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #888; gap: 12px; font-size: .9rem;
      pointer-events: none;
      text-align: center;
      padding: 20px;
    }
    .placeholder svg { opacity: .5; }

    /* ── Controls ── */
    .controls {
      width: min(400px, 85vw);
      display: flex; flex-direction: column; gap: 16px;
      background: rgba(255, 255, 255, 0.4);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    .btn-upload {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--azul); color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; border: none; border-radius: 12px;
      padding: 16px 20px; cursor: pointer;
      box-shadow: 0 4px 15px rgba(13, 124, 196, 0.3);
      transition: all .2s;
    }
    .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(13, 124, 196, 0.4); }

    input[type="file"] { display: none; }

    .zoom-row { display: flex; align-items: center; gap: 12px; padding: 0 4px; }
    .zoom-row label { font-size: .8rem; color: var(--texto-escuro); font-weight: 600; text-transform: uppercase; min-width: 55px; }
    input[type="range"] { flex:1; accent-color: var(--azul); cursor: pointer; height: 6px; }

    .btn-row { display: flex; gap: 12px; }

    .btn-rotate {
      background: var(--branco); border: 2px solid var(--azul); color: var(--azul);
      font-size: 1.4rem; width: 56px; height: 56px; border-radius: 12px;
      cursor: pointer; flex-shrink: 0; transition: all .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-rotate:hover { background: var(--azul); color: var(--branco); }

    .btn-download {
      flex:1; display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--amarelo); color: var(--texto-escuro);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; border: none; border-radius: 12px;
      padding: 16px 20px; cursor: pointer;
      box-shadow: 0 4px 15px rgba(254, 220, 80, 0.3);
      transition: all .2s;
    }
    .btn-download:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(254, 220, 80, 0.4); }
    .btn-download:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

    .hint { font-size: .8rem; color: rgba(0,0,0,0.6); text-align: center; font-weight: 500; }
    footer { margin-top: 40px; font-size: .75rem; color: rgba(0,0,0,0.5); text-align: center; font-weight: 600; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo-container">
    <!-- Logo Maria Amélia Preta para melhor contraste no fundo verde claro -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1344.43 296.35">
      <defs>
        <linearGradient id="grad-logo" x1="751.27" y1="230.14" x2="945.31" y2="37.35" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#1b8a2e"/>
          <stop offset="1" stop-color="#ffd600"/>
        </linearGradient>
      </defs>
      <path fill="#1a1a1a" d="M125.6,49.25,66.11,213.67,6.61,49.25H0V247.1h6.61V84.81l56,155.06h7l56-155.06V247.1h6.61V49.25Z"/>
      <path fill="#1a1a1a" d="M260,49.25l-71,197.85h7.26l19.56-55.09H296.8l19.56,55.09h7.26l-71-197.85Zm-37.15,136.15,33.52-94.5,33.52,94.5Z"/>
      <path fill="#1a1a1a" d="M403.44,49.25V247.1h6.61V161.42h65.17l40.13,85.68h7.4l-41.83-88.4c33.44-6.43,53.84-28.84,53.84-55.63,0-32.33-25.13-53.82-59.4-53.82Zm6.61,105.56V55.86h52.79c30.13,0,52.79,18,52.79,47.48,0,29.3-22.66,47.48-52.79,47.48Z"/>
      <path fill="#1a1a1a" d="M589.67,49.25V247.1h6.61V49.25Z"/>
      <path fill="#1a1a1a" d="M725.26,49.25l-71,197.85h7.26l19.56-55.09H762.1l19.56,55.09h7.26l-71-197.85Zm-37.15,136.15,33.52-94.5,33.52,94.5Z"/>
      <path fill="#1a1a1a" d="M1066.45,49.25l-71,197.85h7.26l19.56-55.09h82.59l19.56,55.09h7.26l-71-197.85Zm-37.15,136.15,33.52-94.5,33.52,94.5Z"/>
      <path fill="#1a1a1a" d="M1171.17,49.25,1111.68,213.67l-59.5-164.42h-6.61V247.1h6.61V84.81l56,155.06h7l56-155.06V247.1h6.61V49.25Z"/>
      <path fill="#1a1a1a" d="M1256.4,49.25V247.1h6.61V49.25Z"/>
      <path fill="#1a1a1a" d="M1251.68,36.56l26.24-29.4h-7.6l-23.77,29.4Z"/>
      <path fill="#1a1a1a" d="M1337.82,49.25l-71,197.85h7.26l19.56-55.09h82.59l19.56,55.09h7.26l-71-197.85Zm-37.15,136.15,33.52-94.5,33.52,94.5Z"/>
      <path fill="url(#grad-logo)" d="M848.3,281.86s-10.37,14.49-31.54,14.49c-30,0-65.49-26.6-65.49-81.87,0-54.67,39.63-100,84.11-100,19.33,0,32,9.36,32,9.36s12.67-9.36,32-9.36c44.48,0,84.11,45.33,84.11,100,0,55.27-35.49,81.87-65.49,81.87-21.17,0-31.54-14.49-31.54-14.49s-10.43,14.49-38.16,14.49Zm38.16-156.41c-16.14,0-26.74,8.12-26.74,8.12l-11.42,10.23-11.42-10.23s-10.6-8.12-26.74-8.12c-38.6,0-73,40.16-73,89.09,0,49,31.7,70.91,58.42,70.91,18.86,0,28.1-12.91,28.1-12.91l4.66-6.42,4.66,6.42s9.24,12.91,28.1,12.91c26.72,0,58.42-21.91,58.42-70.91,0-48.93-34.4-89.09-73-89.09Z"/>
    </svg>
  </div>
  <h1>Filtro oficial de perfil</h1>
  <p>Envie sua foto, ajuste e baixe com o filtro da Maria Amélia</p>
</div>

<!-- Circular preview -->
<div class="circle-outer">
  <div class="circle-inner" id="circ">
    <canvas id="cv" width="1000" height="1000"></canvas>
    <div class="placeholder" id="ph">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="m21 15-5-5L5 21"/>
      </svg>
      <p>Clique abaixo para escolher<br>sua foto de perfil</p>
    </div>
  </div>
</div>

<div class="controls">

  <label class="btn-upload" for="fi">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    Escolher minha foto
  </label>
  <input type="file" id="fi" accept="image/*" />

  <div class="zoom-row">
    <label>🔍 Zoom</label>
    <input type="range" id="zoomR" min="0.5" max="3" step="0.01" value="1" />
  </div>

  <div class="btn-row">
    <button class="btn-rotate" id="rotBtn" title="Girar 90°">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 4v6h-6"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
    <button class="btn-download" id="dlBtn" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Baixar minha foto
    </button>
  </div>

  <p class="hint">✋ Arraste a foto para reposicionar</p>
</div>

<footer>#MinhaEsperançaTemVoz · Maria Amélia</footer>

<script>
  const cv  = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const S   = 1000; // canvas size

  let userImg  = null;
  let frameImg = null;
  let zoom = 1, rot = 0;
  let ox = 0, oy = 0;

  // ── Load frame PNG ──────────────────────────────────────────
  function loadFrame() {
    return new Promise(resolve => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        frameImg = img;
        resolve();
      };
      img.onerror = (e) => {
        console.error('Erro ao carregar moldura.png', e);
        resolve();
      };
      img.src = 'moldura.png?v=' + Date.now();
    });
  }

  // ── Draw ────────────────────────────────────────────────────
  function draw() {
    ctx.clearRect(0, 0, S, S);

    // 1. User photo
    if (userImg) {
      ctx.save();
      ctx.translate(S / 2 + ox, S / 2 + oy);
      ctx.rotate(rot * Math.PI / 180);
      ctx.scale(zoom, zoom);
      const iw = userImg.naturalWidth, ih = userImg.naturalHeight;
      const base = Math.max(S / iw, S / ih);
      ctx.drawImage(userImg, -iw * base / 2, -ih * base / 2, iw * base, ih * base);
      ctx.restore();
    } else {
      ctx.fillStyle = '#f8f9fa';
      ctx.fillRect(0, 0, S, S);
    }

    // 2. Frame overlay
    if (frameImg && frameImg.complete && frameImg.naturalWidth > 0) {
      ctx.drawImage(frameImg, 0, 0, S, S);
    }
  }

  // ── File input ──────────────────────────────────────────────
  document.getElementById('fi').addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        userImg = img;
        zoom = 1; rot = 0; ox = 0; oy = 0;
        document.getElementById('zoomR').value = 1;
        document.getElementById('ph').style.display = 'none';
        document.getElementById('dlBtn').disabled = false;
        draw();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(f);
  });

  // ── Zoom slider ─────────────────────────────────────────────
  document.getElementById('zoomR').addEventListener('input', e => {
    zoom = parseFloat(e.target.value);
    draw();
  });

  // ── Rotate ──────────────────────────────────────────────────
  document.getElementById('rotBtn').addEventListener('click', () => {
    rot = (rot + 90) % 360;
    draw();
  });

  // ── Drag helpers ────────────────────────────────────────────
  const circ = document.getElementById('circ');
  let dragging = false, ds = {x:0,y:0}, oxa = 0, oya = 0;

  function pos(e) {
    const r = cv.getBoundingClientRect();
    const sx = S / r.width, sy = S / r.height;
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) * sx, y: (src.clientY - r.top) * sy };
  }

  circ.addEventListener('mousedown', e => {
    if (!userImg) return;
    dragging = true; ds = pos(e); oxa = ox; oya = oy;
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const p = pos(e); ox = oxa + p.x - ds.x; oy = oya + p.y - ds.y; draw();
  });
  window.addEventListener('mouseup', () => { dragging = false; });

  circ.addEventListener('touchstart', e => {
    if (!userImg || e.touches.length !== 1) return;
    e.preventDefault(); dragging = true; ds = pos(e); oxa = ox; oya = oy;
  }, {passive: false});
  circ.addEventListener('touchmove', e => {
    if (e.touches.length === 2) return;
    if (!dragging) return;
    e.preventDefault();
    const p = pos(e); ox = oxa + p.x - ds.x; oy = oya + p.y - ds.y; draw();
  }, {passive: false});
  circ.addEventListener('touchend', () => { dragging = false; });

  // Pinch zoom
  let lastPinch = null;
  circ.addEventListener('touchmove', e => {
    if (e.touches.length !== 2) return;
    e.preventDefault();
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                         e.touches[0].clientY - e.touches[1].clientY);
    if (lastPinch) {
      zoom = Math.min(3, Math.max(0.5, zoom * d / lastPinch));
      document.getElementById('zoomR').value = zoom;
      draw();
    }
    lastPinch = d;
  }, {passive: false});
  circ.addEventListener('touchend', () => { lastPinch = null; });

  // ── Download ────────────────────────────────────────────────
  document.getElementById('dlBtn').addEventListener('click', () => {
    draw();
    const tmp = document.createElement('canvas');
    tmp.width = tmp.height = S;
    const tc = tmp.getContext('2d');
    tc.beginPath();
    tc.arc(S/2, S/2, S/2, 0, Math.PI * 2);
    tc.closePath();
    tc.clip();
    tc.drawImage(cv, 0, 0);

    const a = document.createElement('a');
    a.download = 'filtro-maria-amelia.png';
    a.href = tmp.toDataURL('image/png');
    a.click();
  });

  loadFrame().then(() => draw());
</script>
</body>
</html>
