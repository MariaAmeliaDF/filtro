<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Maria Amélia · #MinhaEsperançaTemVoz</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --amarelo: #FFD600;
      --azul: #1A47A8;
      --verde: #1B8A2E;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: #0a0f1e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 48px;
      color: #fff;
    }

    .header { text-align: center; margin-bottom: 24px; }
    .header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
      line-height: 1.1;
    }
    .header h1 .tag { color: var(--amarelo); display: block; }
    .header p { font-size: .85rem; color: #778; margin-top: 6px; }

    /* ── The circular preview ── */
    .circle-outer {
      width: min(400px, 90vw);
      aspect-ratio: 1/1;
      border-radius: 50%;
      padding: 6px;
      background: conic-gradient(var(--amarelo) 0%, var(--azul) 50%, var(--amarelo) 100%);
      box-shadow: 0 12px 50px rgba(0,0,0,.7);
      margin-bottom: 24px;
    }
    .circle-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      background: #141428;
      cursor: grab;
      touch-action: none;
      user-select: none;
    }
    .circle-inner:active { cursor: grabbing; }

    /* The canvas fills the circle */
    #cv {
      width: 100%;
      height: 100%;
      display: block;
    }

    .placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #445; gap: 8px; font-size: .85rem;
      pointer-events: none;
    }
    .placeholder svg { opacity: .35; }

    /* ── Controls ── */
    .controls {
      width: min(400px, 90vw);
      display: flex; flex-direction: column; gap: 14px;
    }

    .btn-upload {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--amarelo); color: #111;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; border: none; border-radius: 10px;
      padding: 15px 20px; cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,214,0,.35);
      transition: transform .12s, box-shadow .12s;
    }
    .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 6px 26px rgba(255,214,0,.5); }

    input[type="file"] { display: none; }

    .zoom-row { display: flex; align-items: center; gap: 12px; }
    .zoom-row label { font-size: .75rem; color: #778; text-transform: uppercase; letter-spacing: .08em; min-width: 48px; }
    input[type="range"] { flex:1; accent-color: var(--amarelo); cursor: pointer; height: 4px; }

    .btn-row { display: flex; gap: 10px; }

    .btn-rotate {
      background: #1a2040; border: 1px solid #2a3560; color: #fff;
      font-size: 1.5rem; width: 54px; height: 54px; border-radius: 10px;
      cursor: pointer; flex-shrink: 0; transition: background .12s;
    }
    .btn-rotate:hover { background: #22305a; }

    .btn-download {
      flex:1; display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--azul); color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; border: none; border-radius: 10px;
      padding: 15px 20px; cursor: pointer;
      box-shadow: 0 4px 20px rgba(26,71,168,.35);
      transition: transform .12s, box-shadow .12s;
    }
    .btn-download:hover { transform: translateY(-2px); box-shadow: 0 6px 26px rgba(26,71,168,.5); }
    .btn-download:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .hint { font-size: .72rem; color: #445; text-align: center; }
    footer { margin-top: 40px; font-size: .68rem; color: #334; text-align: center; }
  </style>
</head>
<body>

<div class="header">
  <h1>Foto de Perfil<span class="tag">#MinhaEsperançaTemVoz</span></h1>
  <p>Envie sua foto, ajuste e baixe com a moldura da Maria Amélia</p>
</div>

<!-- Circular preview -->
<div class="circle-outer">
  <div class="circle-inner" id="circ">
    <canvas id="cv" width="1000" height="1000"></canvas>
    <div class="placeholder" id="ph">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="m21 15-5-5L5 21"/>
      </svg>
      Escolha uma foto para começar
    </div>
  </div>
</div>

<div class="controls">

  <label class="btn-upload" for="fi">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    Escolher minha foto
  </label>
  <input type="file" id="fi" accept="image/*" />

  <div class="zoom-row">
    <label>🔍 Zoom</label>
    <input type="range" id="zoomR" min="0.5" max="3" step="0.01" value="1" />
  </div>

  <div class="btn-row">
    <button class="btn-rotate" id="rotBtn" title="Girar 90°">↻</button>
    <button class="btn-download" id="dlBtn" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Baixar minha foto
    </button>
  </div>

  <p class="hint">✋ Arraste para reposicionar · use o zoom para ajustar</p>
</div>

<footer>#MinhaEsperançaTemVoz · Maria Amélia · imagem 1000×1000px</footer>

<script>
  const cv  = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const S   = 1000; // canvas size

  let userImg  = null;
  let frameImg = null;
  let zoom = 1, rot = 0;
  let ox = 0, oy = 0;

  // ── Load frame PNG ──────────────────────────────────────────
  function loadFrame() {
    return new Promise(resolve => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        frameImg = img;
        console.log('Frame loaded:', img.naturalWidth, img.naturalHeight);
        resolve();
      };
      img.onerror = (e) => {
        console.error('Erro ao carregar moldura.png — verifique se o arquivo está na mesma pasta.', e);
        resolve();
      };
      // Add cache-bust to avoid stale version
      img.src = 'moldura.png?v=' + Date.now();
    });
  }

  // ── Draw ────────────────────────────────────────────────────
  function draw() {
    ctx.clearRect(0, 0, S, S);

    // 1. User photo
    if (userImg) {
      ctx.save();
      ctx.translate(S / 2 + ox, S / 2 + oy);
      ctx.rotate(rot * Math.PI / 180);
      ctx.scale(zoom, zoom);
      const iw = userImg.naturalWidth, ih = userImg.naturalHeight;
      const base = Math.max(S / iw, S / ih);
      ctx.drawImage(userImg, -iw * base / 2, -ih * base / 2, iw * base, ih * base);
      ctx.restore();
    } else {
      ctx.fillStyle = '#141428';
      ctx.fillRect(0, 0, S, S);
    }

    // 2. Frame overlay (must be drawn AFTER the photo, on top)
    if (frameImg && frameImg.complete && frameImg.naturalWidth > 0) {
      ctx.drawImage(frameImg, 0, 0, S, S);
    }
  }

  // ── File input ──────────────────────────────────────────────
  document.getElementById('fi').addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        userImg = img;
        zoom = 1; rot = 0; ox = 0; oy = 0;
        document.getElementById('zoomR').value = 1;
        document.getElementById('ph').style.display = 'none';
        document.getElementById('dlBtn').disabled = false;
        draw();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(f);
  });

  // ── Zoom slider ─────────────────────────────────────────────
  document.getElementById('zoomR').addEventListener('input', e => {
    zoom = parseFloat(e.target.value);
    draw();
  });

  // ── Rotate ──────────────────────────────────────────────────
  document.getElementById('rotBtn').addEventListener('click', () => {
    rot = (rot + 90) % 360;
    draw();
  });

  // ── Drag helpers ────────────────────────────────────────────
  const circ = document.getElementById('circ');
  let dragging = false, ds = {x:0,y:0}, oxa = 0, oya = 0;

  function pos(e) {
    const r = cv.getBoundingClientRect();
    const sx = S / r.width, sy = S / r.height;
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) * sx, y: (src.clientY - r.top) * sy };
  }

  circ.addEventListener('mousedown', e => {
    if (!userImg) return;
    dragging = true; ds = pos(e); oxa = ox; oya = oy;
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const p = pos(e); ox = oxa + p.x - ds.x; oy = oya + p.y - ds.y; draw();
  });
  window.addEventListener('mouseup', () => { dragging = false; });

  circ.addEventListener('touchstart', e => {
    if (!userImg || e.touches.length !== 1) return;
    e.preventDefault(); dragging = true; ds = pos(e); oxa = ox; oya = oy;
  }, {passive: false});
  circ.addEventListener('touchmove', e => {
    if (e.touches.length === 2) return;
    if (!dragging) return;
    e.preventDefault();
    const p = pos(e); ox = oxa + p.x - ds.x; oy = oya + p.y - ds.y; draw();
  }, {passive: false});
  circ.addEventListener('touchend', () => { dragging = false; });

  // Pinch zoom
  let lastPinch = null;
  circ.addEventListener('touchmove', e => {
    if (e.touches.length !== 2) return;
    e.preventDefault();
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                         e.touches[0].clientY - e.touches[1].clientY);
    if (lastPinch) {
      zoom = Math.min(3, Math.max(0.5, zoom * d / lastPinch));
      document.getElementById('zoomR').value = zoom;
      draw();
    }
    lastPinch = d;
  }, {passive: false});
  circ.addEventListener('touchend', () => { lastPinch = null; });

  // ── Download ────────────────────────────────────────────────
  document.getElementById('dlBtn').addEventListener('click', () => {
    draw(); // ensure up to date

    // Crop to circle
    const tmp = document.createElement('canvas');
    tmp.width = tmp.height = S;
    const tc = tmp.getContext('2d');
    tc.beginPath();
    tc.arc(S/2, S/2, S/2, 0, Math.PI * 2);
    tc.closePath();
    tc.clip();
    tc.drawImage(cv, 0, 0);

    const a = document.createElement('a');
    a.download = 'maria-amelia-moldura.png';
    a.href = tmp.toDataURL('image/png');
    a.click();
  });

  // ── Init ────────────────────────────────────────────────────
  loadFrame().then(() => draw());
</script>
</body>
</html>
